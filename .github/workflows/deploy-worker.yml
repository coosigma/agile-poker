name: Deploy Worker

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Deploy Cloudflare Worker
        uses: cloudflare/wrangler-action@v3
        env:
          WRANGLER_LOG: debug
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          wranglerVersion: "4"
          workingDirectory: backend
          command: deploy
